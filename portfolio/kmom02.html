<body>
<main>
    <h1>Rotating Triangles</h1>
<div class="canvas-container">
    <canvas id="canvas" class="canvas" width="800" height="500"></canvas>
    <div id="fpsCounter">0 fps</div>
</div>

    <p>
        <input id="play"  type="button" value="Play" />
        <input id="pause" type="button" value="Pause" />
        <input id="add" type="button" value="Add random" />
        Speed: <input id="speed" type="range" step="0.01" min="0.01" max="10.0" value="1.0"/>
    </p>
</main>

<footer>
    <p>Validators:
        <a href="http://validator.w3.org/check/referer">HTML5</a>
        <a href="http://jigsaw.w3.org/css-validator/check/referer">CSS</a>

        <a href="http://jshint.com/">JSHint</a>
    </p>
</footer>

<!-- vertex shader -->
<script id="vertex-shader" type="x-shader/x-vertex">
    attribute vec4 a_Position;
    uniform mat4 u_ModelMatrix;

    void main() {
        gl_Position = u_ModelMatrix * a_Position;
    }
</script>

<!-- fragment shader -->
<script id="fragment-shader" type="x-shader/x-fragment">
    precision mediump float;

    uniform vec4 u_FragColor;

    void main() {
        gl_FragColor = u_FragColor;
    }
</script>

<!-- include javascript -->
<script type="text/javascript" src="../../me/lib/webgl-utils.js"></script>
<script type="text/javascript" src="../../me/libs/webgl-debug.js"></script>
<script type="text/javascript" src="../../me/lib/cuon-utils.js"></script>
<script type="text/javascript" src="../../me/lib/cuon-matrix.js"></script>
<script type="text/javascript" src="js/triangles.js"></script>

</body>
</html>
