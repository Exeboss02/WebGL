<!-- vertex shader -->
<script id="vertex-shader" type="x-shader/x-vertex">
    attribute vec4 a_Position;
    attribute vec2 a_TexCoord;
    varying vec2 v_TexCoord;

    void main() {
        //gl_Position = u_ProjectionMatrix * u_ModelMatrix * a_Position;
        gl_Position = a_Position;
        v_TexCoord = a_TexCoord;
    }
</script>

<!-- fragment shader -->
<script id="fragment-shader" type="x-shader/x-fragment">
precision mediump float;

// Uniforms
uniform vec3 lightPosition;
uniform vec3 cameraPosition;
uniform vec3 spherePosition;
uniform float sphereRadius;
uniform float aspectRatio;

uniform vec3 pos1;
uniform vec3 pos2;
uniform vec3 pos3;
uniform vec3 pos4;
uniform vec3 pos5;
uniform vec3 pos6;
uniform vec3 pos7;
uniform vec3 pos8;

uniform vec4 u_FragColor;
varying vec2 v_TexCoord;

struct SceneSDFResult
{
    float minimumDistance;
    int sphereIndex;
};

// Signed Distance Function (SDF) for a sphere
float SphereSDF(vec3 position, vec3 spherePosition, float sphereRadius) {
    return length(position - spherePosition) - sphereRadius;
}

float SmoothUnion(float sdf1, float sdf2, float blendFactor)
{
    float h = max(blendFactor-abs(sdf1-sdf2),0.0);
    return min(sdf1, sdf2) - h*h*0.25/blendFactor;
}

SceneSDFResult SceneSDF(vec3 positions[8], vec3 pointStep)
{
    SceneSDFResult result;
    result.minimumDistance = 10000.0;
    result.sphereIndex = -1;
    float distances[8];

    for(int i = 0; i < 8; i++)
    {
        float distance = SphereSDF(pointStep, positions[i], sphereRadius);
        distances[i] = distance;

        if(distance < result.minimumDistance)
        {
            //result.minimumDistance = distance; //removing this makes them look floateyer but less 3D
            result.sphereIndex = i;
        }
    }

    result.minimumDistance = -1.0;

    float blendedDistance = distances[0];
    for(int i = 1; i < 8; i++)
    {
        blendedDistance = SmoothUnion(blendedDistance, distances[i], 2.5);
    }

    result.minimumDistance = blendedDistance;

    return result;
}

vec3 RayMarch(vec3 spherePositions[8], vec3 sphereColours[8], vec3 rayOrigin, vec3 rayDirection) {
    const int maxSteps = 80;
    const float minDistance = 0.001;
    const float maxDistance = 100.0;

    float t = 0.0;
    vec3 pointStep;

    for(int i = 0; i < maxSteps; i++)
    {
        pointStep = rayOrigin + rayDirection * t;
        float distance = 0.0;

        SceneSDFResult result = SceneSDF(spherePositions, pointStep);

        if(result.minimumDistance < minDistance)
        {
            vec3 normal;
            vec3 colour;

            //not pretty, but has to somehow create a constant int at runtime to be able to index the array
            if(result.sphereIndex == 0)
            {
                normal = normalize(pointStep - spherePositions[0]);
            }
            if(result.sphereIndex == 1)
            {
                normal = normalize(pointStep - spherePositions[1]);
            }
            if(result.sphereIndex == 2)
            {
                normal = normalize(pointStep - spherePositions[2]);
            }
            if(result.sphereIndex == 3)
            {
                normal = normalize(pointStep - spherePositions[3]);
            }
            if(result.sphereIndex == 4)
            {
                normal = normalize(pointStep - spherePositions[4]);
            }
            if(result.sphereIndex == 5)
            {
                normal = normalize(pointStep - spherePositions[5]);
            }
            if(result.sphereIndex == 6)
            {
                normal = normalize(pointStep - spherePositions[6]);
            }
            if(result.sphereIndex == 7)
            {
                normal = normalize(pointStep - spherePositions[7]);
            }

            vec3 lightVector = normalize(lightPosition - pointStep);

            float lightMultiplier = max(dot(normal, lightVector), 0.3);


            return sphereColours[0] * lightMultiplier * (1.0 - max(abs(normal.x), 0.0)) * (1.0 - max(abs(normal.y), 0.0)) + vec3(0.2, 0, 0.6) * max(abs(normal.x), 0.0) + vec3(0.2, 0, 0.6) * max(abs(normal.y), 0.0);
        }

        t += result.minimumDistance;

        if(t > maxDistance) {
            break;
        }
    }

    return vec3(0.2, 0, 0.6);
}

void main() {
    vec3 cameraForward = vec3(0, 0, 1);
    vec3 cameraUp = vec3(0, 1, 0);
    vec3 cameraRight = vec3(1, 0, 0);
    float cameraFov = 3.14 / 2.0;

    //this is awful, but is a workaround since webgl 1.0 doesnt support uniform buffers
    vec3 colours[8];
    colours[0] = vec3(1, 0, 0);
    colours[1] = vec3(1, 1, 0);
    colours[2] = vec3(1, 1, 1);
    colours[3] = vec3(0, 1, 0);
    colours[4] = vec3(0, 0, 1);
    colours[5] = vec3(1, 0, 1);
    colours[6] = vec3(0.2, 0.6, 1);
    colours[7] = vec3(1, 0.2, 0.8);

    vec3 positions[8];
    positions[0] = pos1;
    positions[1] = pos2;
    positions[2] = pos3;
    positions[3] = pos4;
    positions[4] = pos5;
    positions[5] = pos6;
    positions[6] = pos7;
    positions[7] = pos8;

    vec2 uv = v_TexCoord;
    vec2 screenPos = (uv - 0.5) * 2.0; // Convert UV to [-1, 1] range

    vec3 rayDirection = normalize(
        cameraForward +
        screenPos.x * cameraRight * (1.0 / tan(cameraFov * 0.5)) * aspectRatio +
        screenPos.y * cameraUp * (1.0 / tan(cameraFov * 0.5))
    );

    vec3 rayOrigin = cameraPosition;

    vec3 pixelColor = RayMarch(positions, colours, rayOrigin, rayDirection);
    gl_FragColor = vec4(pixelColor, 1.0);
}
</script>
